version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: mvgsm
      POSTGRES_PASSWORD: mvgsm_password
      POSTGRES_DB: mvgsm_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./drizzle/0001_init.up.sql:/docker-entrypoint-initdb.d/01-schema.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mvgsm"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - DATABASE_URL=postgresql://mvgsm:mvgsm_password@postgres:5432/mvgsm_db
      - JWT_SECRET=mvgsm-secret-key-change-in-production
      - JWT_EXPIRES_IN=28800
      - REFRESH_EXPIRES_IN=2592000
      - CORS_ORIGIN=http://localhost:3000
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=http://localhost:3001
    depends_on:
      - api
    restart: unless-stopped

volumes:
  postgres_data: